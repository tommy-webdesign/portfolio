<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEWS詳細</title>

    <style>
        html{
            scroll-behavior: smooth;
        }

        body{
            margin:0;
            font-family: sans-serif;
            line-height:1.6;
            background:#f5f7fa;
        }

        .container{
            width:90%;
            margin:0 auto;
        }

        header{
            background:#fff;
            border-bottom:1px solid #ddd;
            position:sticky;
            top:0;
            z-index: 10;
        }

        .header-inner{
            display:flex;
            justify-content:space-between;
            align-items:center;
            padding:15px 0;
        }

        nav{
            display:block;
            margin-right:15px;
        }

        nav ul{
            display:flex;
            justify-content: flex-end;
            list-style:none;
            gap:20px;
            margin:0;
            padding:0;
        }

        .hamburger{
            width: 30px;
            cursor:pointer;
            display: none;
        }

        .hamburger span{
            display: block;
            height: 3px;
            background: #333;
            margin:6px 0;
        }

        nav a{
            text-decoration:none;
            color:#333;
            background:#fff;
        }

        nav a:hover{
            background:#f5f5f5;
        }

        section{
            padding:60px 0;
        }

        h2{
            text-align:center;
            margin-bottom:30px;
        }

        #title{
            font-size:28px;
            margin-bottom:10px;
            font-weight:bold;
            line-height:1.4;
        }

        #title::after{
            content:"";
            display:block;
            width:50px;
            height:3px;
            background:#4facfe;
            margin-top:10px;
            border-radius:2px;
        }

        .news{
            background:#fff;
            padding:40px;
            border-radius:15px;
            box-shadow:0 10px 30px rgba(0,0,0,0.1);

            max-width:800px;
            margin:60px auto;

            opacity:0;
            transform:translateY(20px);
            transition:1s;
            border-top:5px solid #4facfe;
        }

        .news.show{
            opacity:1;
            transform:translateY(0);
        }        
        
        .content{
            line-height:1.9;
            font-size:16px;
            margin-top:20px;
        }

        #image{
            width:100%;
            max-height:400px;
            object-fit:cover;
            border-radius:10px;
            margin-bottom:20px;
            box-shadow:0 5px 15px rgba(0,0,0,0.1);
        }

        .back{
            display:inline-block;
            margin-top:40px;
            padding:10px 20px;
            text-decoration:none;
            color:#fff;
            background:#4facfe;
            border-radius:20px;
            font-weight:bold;
            transition:0.3s;
        }

        a.back{
            color: #fff;
        }

        .back:hover{
            background:#007BFF;
        }

        

        @media(max-width:768px){

            /* 全体 */
            body{
                font-size:14px;
            }

            .container{
                width:90%;
            }

            /* ヘッダー */
            .header-inner{
                flex-direction:row;
                align-items:flex-start;
            }

            .hamburger{
                display:block;
                margin-left:auto;
            }
            nav{
                display:none;
                width:100px;
                position:fixed;
                top:50px;
                right:0;
                background:#fff;
                z-index:100;
                padding: 10px;
            }

            nav a{
                display: block;
                padding: 10px;
                border-bottom: 1px solid #ddd;
            }

            nav.active{
                display: block;
            }

            nav ul{
                flex-direction:column;
                background:#fff;
                padding: 10px 0;
            }
        }

        /* 日付 */
        .date{
            color:#888;
            margin-bottom:30px;
        }

        /* 本文 */
        .content{
            line-height:1.8;
            font-size:16px;
        }

        /* 戻る */
        .back{
            display:inline-block;
            margin-top:40px;
            text-decoration:none;
            color:#007BFF;
            font-weight:bold;
        }
    </style>
    </head>

    <body>
        <header>
            <div class="container header-inner">
                <h1>Tommy Web制作</h1>
                <div class="hamburger" id="hamburger">
                    <span></span>
                    <span></span>
                    <span></span>
                </div>
                <nav id="nav">
                    <ul>
                        <li><a href="#">HOME</a></li>
                        <li><a href="#news">NEWS</a></li>
                        <li><a href="#service">SERVICE</a></li>
                        <li><a href="#works">WORKS</a></li>
                        <li><a href="#company">COMPANY</a></li>
                        <li><a href="#contact">CONTACT</a></li>
                    </ul>
                </nav>
            </div>
        </header>
        <div class="container">
            <div class="news">
                <p style="font-size:14px; color:#888;">
                    <a href="index.html">HOME</a> ＞ NEWS ＞ 詳細
                </p>
                <h1 id="title"></h1>
                <p class="date" id="date"></p>
                <img id="image">
                <div class="content" id="content"></div>

                <a href="index.html" class="back">← 一覧に戻る</a>
            </div>
        </div>

        <script>
            const params = new URLSearchParams(window.location.search);
            const id = params.get('id');

            fetch(`https://tommyweb.microcms.io/api/v1/news/${id}`, {
                headers: {
                    'X-MICROCMS-API-KEY': 'qBJSTxKoWUFypyrfy0bUCRIA5mJvQBAVBfne'
                }
            })
            .then(res => res.json())
            .then(data => {
                document.getElementById('title').textContent = data.title;
                document.getElementById('date').textContent =
                    new Date(data.date).toLocaleDateString('ja-JP');

                document.getElementById('content').innerHTML =
                    data.content
                        .replace(/\n/g, "<br>")
                        .replace(/(https?:\/\/[^\s<]+)/g, '<a href="$1" target="_blank">$1</a>')

                if(data.image && data.image.url){
                    document.getElementById('image').src = data.image.url;
                }

                document.querySelector('.news').classList.add('show');
            });

        
        </script>

    </body>
</html>
